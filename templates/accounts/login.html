{% extends 'base.html' %}

{% block title %}Login - UniNotes ERP{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-dark text-white text-center py-4">
                <h3 class="mb-0"><i class="fas fa-graduation-cap me-2"></i>UniNotes ERP</h3>
                <p class="mb-0 text-muted small">University Notes & Enrollment Platform</p>
            </div>
            <div class="card-body p-4">
                <h5 class="text-center mb-4">Sign In to Your Account</h5>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                </form>
            </div>
            <div class="card-footer text-center py-3">
                <a href="{% url 'register' %}" class="text-decoration-none">
                    New student? Create an account
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
